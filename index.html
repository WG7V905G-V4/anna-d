<!DOCTYPE html>
<html>
<head>
<style> 

body {
  background-image: url(c8818ca69d55bf089afe0f357ac4f776.jpg);
  width: 100%;
    height: 100%;
    overflow: hidden;
    background-size: cover;
    margin: 0;

}

.circle {
    position: absolute;
  aspect-ratio: 1;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.289);
  backdrop-filter: blur(20px);
}

.c1 {
    width: 10%;
  animation: animation1 8s 100;
  animation-direction: alternate;
  transition: all 0.5s ease-in-out;
}
.c2 {
    width: 15%;

  animation: animation2 10s 100;
  animation-direction: alternate;
  transition: all 0.5s ease-in-out;
}
.c3 {
    width: 24%;

  animation: animation3 9s 100;
  animation-direction: alternate;
  transition: all 0.5s ease-in-out;
}
.c4 {
    width: 20%;
  animation: animation4 6s 100;
  animation-direction: alternate;
  transition: all 0.5s ease-in-out;
}
.c5 {
    width: 12%;
  animation: animation5 7s 100;
  animation-direction: alternate;
  transition: all 0.5s ease-in-out;
}

@keyframes animation1 {
  0%   {left: 35%; top: 35%;}
  50%  {left: 70%; top: 75%;}
  100% {left: 35%; top: 35%;}
}

@keyframes animation2 {
  0%   {left: 35%; top: 35%;}
  50%  {left: 20%; top: 22%;}
  100%   {left: 35%; top: 35%;}
}
@keyframes animation3 {
  0%   {left: 35%; top: 35%;}
  50%  {left: 20%; top: 50%;}
  100%   {left: 35%; top: 35%;}
}
@keyframes animation4 {
  0%   {left: 35%; top: 35%;}
  50%  {left: 60%; top: 20%;}
  100%   {left: 35%; top: 35%;}
}
@keyframes animation5 {
  0%   {left: 35%; top: 35%;}
  50%  {left: 40%; top: 10%;}
  100%   {left: 35%; top: 35%;}
}

</style>
</head>
<body>
<div class = "circle c1"></div>
<div class = "circle c2"></div>
<div class = "circle c3"></div>
<div class = "circle c4"></div>
<div class = "circle c5"></div>
</body>
</html>
